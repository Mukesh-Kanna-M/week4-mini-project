apiVersion: v1
kind: Service
metadata:
  name: my-nodeport-service
spec:
  type: NodePort
  selector:
    app: week4-app     # Must match the labels on your target Pods
  ports:
    - port: 80         # Port exposed internally within the cluster
      targetPort: 80   # Port your application container is listening on
      nodePort: 30007  # Optional: Fixed external port (30000-32767)
      protocol: TCP
